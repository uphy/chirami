  <!-- # vertical bars -->
  <rect x="347" y="120" width="90" height="530" fill="#73610D"/>
  <rect x="587" y="120" width="90" height="530" fill="#73610D"/>

  <!-- # horizontal bars -->
  <rect x="267" y="235" width="490" height="90" fill="#73610D"/>
  <rect x="267" y="445" width="490" height="90" fill="#73610D"/>

  <!-- Text lines -->
  <rect x="195" y="720" width="545" height="28" rx="14" fill="#B8A340"/>
  <rect x="195" y="790" width="405" height="28" rx="14" fill="#B8A340"/>
  <rect x="195" y="860" width="285" height="28" rx="14" fill="#B8A340"/>
</svg>
