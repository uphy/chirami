<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="noteGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5B8"/>
      <stop offset="100%" stop-color="#FFE878"/>
    </linearGradient>
  </defs>

  <!-- Note background with top-right corner cut -->
  <polygon points="0,0 824,0 1024,200 1024,1024 0,1024" fill="url(#noteGrad)"/>

  <!-- Corner fold (underside) -->
