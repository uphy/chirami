name: Chirami

options:
  bundleIdPrefix: io.github.uphy
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.0"
  Yams:
    url: https://github.com/jpsim/Yams
    from: "5.0.0"

targets:
  Chirami:
    type: application
    platform: macOS
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        shell: /bin/bash
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --strict
          else
            echo "warning: SwiftLint not installed. Run 'brew install swiftlint'."
          fi
    sources:
      - path: Chirami
    info:
      path: Chirami/Info.plist
      properties:
        CFBundleDisplayName: Chirami
        CFBundleName: Chirami
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSUIElement: true
        NSHumanReadableCopyright: "Copyright © 2024 uphy"
        NSPrincipalClass: NSApplication
        NSDesktopFolderUsageDescription: "Chirami needs access to Desktop to read and write your note files."
        NSDocumentsFolderUsageDescription: "Chirami needs access to Documents to read and write your note files."
        NSDownloadsFolderUsageDescription: "Chirami needs access to Downloads to read and write your note files."
        CFBundleURLTypes:
          - CFBundleURLName: io.github.uphy.Chirami
            CFBundleURLSchemes:
              - chirami
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        PRODUCT_BUNDLE_IDENTIFIER: io.github.uphy.Chirami
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Chirami/Chirami.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: HotKey
        product: HotKey
      - package: Yams
        product: Yams
  ChiramiTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ChiramiTests
    dependencies:
      - target: Chirami
      - package: Yams
        product: Yams
    settings:
      base:
        SWIFT_VERSION: "5.9"
