name: CI

on:
  pull_request:
    paths:
      - '**/*.swift'
      - '.swiftlint.yml'
      - 'Package.swift'
      - 'Package.resolved'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Run SwiftLint
        run: mise run lint

  test-and-build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Run tests
        run: swift test

      - name: Build release
        run: swift build -c release
