name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: swift test

      - name: Build release binary
        run: swift build -c release

      - name: Create .app bundle
        run: |
          version="${{ steps.version.outputs.value }}"
          app_dir="build/Chirami.app/Contents"
          mkdir -p "$app_dir/MacOS" "$app_dir/Resources"

          cp .build/release/Chirami "$app_dir/MacOS/Chirami"

          sed \
            -e 's/$(DEVELOPMENT_LANGUAGE)/en/' \
            -e 's/$(EXECUTABLE_NAME)/Chirami/' \
            -e 's/$(PRODUCT_BUNDLE_IDENTIFIER)/com.uphy.Chirami/' \
            -e "s/\$(MARKETING_VERSION)/$version/" \
            -e "s/\$(CURRENT_PROJECT_VERSION)/$version/" \
            -e 's/$(MACOSX_DEPLOYMENT_TARGET)/14.0/' \
            Chirami/Info.plist > "$app_dir/Info.plist"

      - name: Create zip archive
        run: |
          version="${{ steps.version.outputs.value }}"
          ditto -c -k build/Chirami.app "Chirami-${version}-macOS.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: Chirami-*.zip
