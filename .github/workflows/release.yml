name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: swift test

      - name: Build release binary
        run: swift build -c release

      - name: Create .app bundle
        run: |
          version="${{ steps.version.outputs.value }}"
          app_dir="build/Chirami.app/Contents"
          mkdir -p "$app_dir/MacOS" "$app_dir/Resources"

          cp .build/release/Chirami "$app_dir/MacOS/Chirami"

          sed \
            -e 's/$(DEVELOPMENT_LANGUAGE)/en/' \
            -e 's/$(EXECUTABLE_NAME)/Chirami/' \
            -e 's/$(PRODUCT_BUNDLE_IDENTIFIER)/io.github.uphy.Chirami/' \
            -e "s/\$(MARKETING_VERSION)/$version/" \
            -e "s/\$(CURRENT_PROJECT_VERSION)/$version/" \
            -e 's/$(MACOSX_DEPLOYMENT_TARGET)/14.0/' \
            Chirami/Info.plist > "$app_dir/Info.plist"

      - name: Create zip archive
        run: |
          version="${{ steps.version.outputs.value }}"
          ditto -c -k --keepParent build/Chirami.app "Chirami-${version}-macOS.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: Chirami-*.zip

      - name: Compute sha256 of zip
        id: sha256
        run: |
          version="${{ steps.version.outputs.value }}"
          echo "value=$(shasum -a 256 "Chirami-${version}-macOS.zip" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_PRIVATE_KEY }}
          repositories: homebrew-tap

      - name: Update homebrew-tap
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          version="${{ steps.version.outputs.value }}"
          sha="${{ steps.sha256.outputs.value }}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/uphy/homebrew-tap.git" homebrew-tap
          cd homebrew-tap

          sed -i '' \
            -e "s/version \"[^\"]*\"/version \"${version}\"/" \
            -e "s/sha256 \"[^\"]*\"/sha256 \"${sha}\"/" \
            Casks/chirami.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/chirami.rb
          git commit -m "chore: update chirami to v${version}"
          git push
