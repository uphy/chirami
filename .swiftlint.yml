# SwiftLint Configuration for Fusen

excluded:
  - .build
  - build
  - Fusen.xcodeproj
  - FusenTests

# Rule customization
line_length:
  warning: 200
  error: 300

force_try:
  severity: warning

file_length:
  warning: 600

type_body_length:
  warning: 500

function_body_length:
  warning: 100

cyclomatic_complexity:
  warning: 20
  error: 30

function_parameter_count:
  warning: 8
  error: 12

large_tuple:
  warning: 4

identifier_name:
  min_length:
    warning: 1
  excluded:
    - id
    - x
    - y
    - w
    - h
    - r
    - g
    - b
    - i
    - j

type_name:
  min_length:
    warning: 2

# Opt-in rules
opt_in_rules:
  - empty_count
  - first_where
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_string
  - sorted_first_last
  - toggle_bool
